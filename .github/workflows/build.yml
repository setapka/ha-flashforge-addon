name: Build and Deploy Addon

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  BUILD_ARGS: "--test"
  MONITORED_FILES: "config.yaml Dockerfile requirements.txt rootfs"

jobs:
  init:
    name: Initialize
    runs-on: ubuntu-latest
    outputs:
      build_args: ${{ steps.build_args.outputs.build_args }}
      monitored_files: ${{ steps.monitored_files.outputs.monitored_files }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set build arguments
        id: build_args
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "build_args=--test" >> $GITHUB_OUTPUT
          else
            echo "build_args=--local" >> $GITHUB_OUTPUT
          fi

      - name: Set monitored files
        id: monitored_files
        run: |
          echo "monitored_files=${{ env.MONITORED_FILES }}" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.arch }} Addon
    runs-on: ubuntu-latest
    needs: init
    strategy:
      matrix:
        arch:
          - aarch64
          - amd64
          - armv7

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.arch }} addon
        uses: home-assistant/builder@2024.08.2
        with:
          args: |
            ${{ needs.init.outputs.build_args }} \
            --${{ matrix.arch }} \
            --target /data \
            --docker-hub ghcr.io/${{ github.repository_owner }} \
            --image-name ha-flashforge-addon \
            --version ${{ steps.version.outputs.version }}

      - name: Push ${{ matrix.arch }} addon to registry
        if: github.event_name != 'pull_request'
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/ha-flashforge-addon:${{ steps.version.outputs.version }}-${{ matrix.arch }}

  deploy:
    name: Deploy Addon
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Update repository.json
        run: |
          sed -i 's/"version": "[^"]*"/"version": "${{ steps.version.outputs.version }}"/' repository.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
